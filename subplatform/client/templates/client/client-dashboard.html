{% extends 'client/navbar.html' %}
{% load static %}

{% block content %}

<div class="container py-5">

    <!-- Welcome Card -->
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body text-center">
            <h4 class="fw-bold mb-2">Welcome, {{ user.first_name }} 👋</h4>
            <p class="text-muted">Ready to continue your learning journey?</p>
        </div>
    </div>
    

    <!-- Dashboard Stats -->
    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="card text-center shadow-sm border-0 p-4">
                <h6 class="text-muted">Articles Read</h6>
                <h3 class="fw-bold text-success">12</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center shadow-sm border-0 p-4">
                <h6 class="text-muted">Bookmarks</h6>
                <h3 class="fw-bold text-primary">5</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center shadow-sm border-0 p-4">
                <h6 class="text-muted">Active Plan</h6>
                <h3 class="fw-bold text-warning">{{ subscription_plan }}</h3>
            </div>
        </div>
    </div>

    <!-- Actions -->
    <div class="card shadow-sm border-0">
        <div class="card-body text-center">
            <h5 class="mb-3">Explore More</h5>

            <a href="{% url 'browse-articles' %}" class="btn btn-success px-4 me-2">
                Browse Articles
            </a>

            <a href="#" class="btn btn-outline-secondary px-4">
                My Bookmarks
            </a>
        </div>
    </div>

</div>

{% endblock %}
