{% extends 'writer/navbar.html' %}

{% block content %}
    <h1>Delete Account</h1>
    <p>Are you sure you want to delete your account?</p>
    <form method="POST">
        {% csrf_token %}
        <button class="btn btn-danger" type="submit">Yes, Delete</button>
        <a href="{% url 'writer-dashboard' %}">Cancel</a>
    </form>
{% endblock %}
