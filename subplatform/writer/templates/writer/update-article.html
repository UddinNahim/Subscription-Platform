{% extends 'writer/navbar.html' %}

{% load crispy_forms_tags %}


{% block content %}

<br>

<div class="container bg-white shadow-md p-5 form-layout">
    <h3> Update an article</h3>

    <p> You may Update an article below: </p>
    <br>

    <form method="POST" autocomplete="off">

        {% csrf_token %}
        {{ UpdateArticleForm|crispy }}

        <button type="submit" class="btn btn-primary" value="Update Article">Update Article</button>
    </form>

</div>







{% endblock %}
