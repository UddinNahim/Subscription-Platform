{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Edenthought</title>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap 5 (Lux theme) -->
    <link rel="stylesheet" href="https://bootswatch.com/5/lux/bootstrap.min.css">

    <!-- Optional custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm px-4">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4" href="#">
            Edenthought
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto gap-2">

                <li class="nav-item">
                    <a class="btn btn-outline-primary" href="{% url 'register' %}">
                        Register
                    </a>
                </li>

                <li class="nav-item">
                    <a class="btn btn-primary" href="{% url 'my-login' %}">
                        Login
                    </a>
                </li>

            </ul>
        </div>
    </div>
</nav>

<!-- HERO SECTION -->
<section class="vh-100 d-flex align-items-center text-center">
    <div class="container">

        <h1 class="display-4 fw-bold mb-3">
            Learn Smarter with Edenthought
        </h1>

        <p class="lead text-muted mb-4">
            Subscribe for high-quality, carefully curated articles designed to expand your knowledge.
        </p>

        <a class="btn btn-success btn-lg px-4" href="{% url 'register' %}">
            Get Started →
        </a>

    </div>
</section>

<!-- FOOTER -->
<footer class="text-center py-4 bg-light">
    <p class="mb-0 text-muted">
        © 2026 Edenthought. All rights reserved.
    </p>
</footer>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Optional custom JS -->
<script src="{% static 'js/script.js' %}"></script>

</body>
</html>
